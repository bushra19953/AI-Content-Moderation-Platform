version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: moderation-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - moderation-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: moderation-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/moderation
      - JWT_SECRET=supersecretjwtkey123
      - CORS_ORIGIN=http://localhost:5173
      - GEMINI_API_KEY_1=${GEMINI_API_KEY_1}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - GEMINI_API_KEY_4=${GEMINI_API_KEY_4}
    depends_on:
      - mongodb
    networks:
      - moderation-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moderation-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - moderation-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  moderation-network:
    driver: bridge

volumes:
  mongodb_data:
